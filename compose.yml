name: diansai-wiki

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: diansai
      POSTGRES_USER: diansai
      POSTGRES_PASSWORD: local-development-only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diansai -d diansai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
